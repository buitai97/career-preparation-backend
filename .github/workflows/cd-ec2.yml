name: CD (EC2)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"

concurrency:
  group: cd-${{ github.ref_name || github.event.workflow_run.head_branch || 'manual' }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'dev'))
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              DEPLOY_BRANCH="${{ github.event.inputs.branch }}"
            else
              DEPLOY_BRANCH="${{ github.event.workflow_run.head_branch }}"
            fi

            echo "Deploying branch: $DEPLOY_BRANCH"

            cd /var/www/backend

            echo "Pulling latest code..."
            git fetch origin
            git checkout $DEPLOY_BRANCH
            git pull origin $DEPLOY_BRANCH

            echo "Installing dependencies..."
            npm ci

            echo "Building project..."
            npm run build

            echo "Restarting backend with PM2..."
            pm2 delete backend 2>/dev/null || true
            pm2 start dist/server.js --name backend --cwd /var/www/backend
            pm2 save

            echo "Deployment successful."